<!DOCTYPE html>
<html>
<head><title>Admin Panel</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
    <h2>Admin - OS Exam</h2>
    <h3>Add Question</h3>
    <input id="qtext" placeholder="Question"><br>
    <input id="optA" placeholder="Option A"><br>
    <input id="optB" placeholder="Option B"><br>
    <input id="optC" placeholder="Option C"><br>
    <input id="optD" placeholder="Option D"><br>
    <select id="correct"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
    <button onclick="addQuestion()">Add Question</button>
    <hr>
    <h3>Results</h3>
    <div id="resultsList"></div>
</div>
<script>
    function addQuestion() {
        let data = {
            question: document.getElementById("qtext").value,
            a: document.getElementById("optA").value,
            b: document.getElementById("optB").value,
            c: document.getElementById("optC").value,
            d: document.getElementById("optD").value,
            correct: document.getElementById("correct").value
        };
        fetch("add_question.php", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        }).then(() => alert("Added"));
    }
    fetch("get_results.php").then(res=>res.json()).then(data=>{
        let html="<ul>";
        data.forEach(r=>{
            html+=`<li>${r.fullname} (${r.roll_no}) → Score: ${r.score}/${r.total_questions}</li>`;
        });
        html+="</ul>";
        document.getElementById("resultsList").innerHTML=html;
    });
</script>
</body>
</html>
