<!DOCTYPE html>
<html>
<head>
    <title>OS Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>OS Test-1</h2>
    <div class="timer"><span id="timer">15:00</span></div>
    <div id="questionsArea"></div>
    <button onclick="submitExam()">Submit Exam</button>
</div>
<script>
    let answers = {};
    let timerInterval;
    const urlParams = new URLSearchParams(window.location.search);
    const roll = urlParams.get('roll');

    function startTimer(duration, display) {
        let timer = duration, minutes, seconds;
        timerInterval = setInterval(() => {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            display.textContent = minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);
            if (--timer < 0) {
                clearInterval(timerInterval);
                submitExam();
            }
        }, 1000);
    }

    fetch("get_questions.php")
        .then(res => res.json())
        .then(questions => {
            let html = "";
            questions.forEach((q, idx) => {
                html += `<div class="question-card">
                            <p><strong>${idx+1}. ${q.question_text}</strong></p>
                            <div class="options">
                                <label><input type="radio" name="q${q.id}" value="A"> ${q.option_a}</label>
                                <label><input type="radio" name="q${q.id}" value="B"> ${q.option_b}</label>
                                <label><input type="radio" name="q${q.id}" value="C"> ${q.option_c}</label>
                                <label><input type="radio" name="q${q.id}" value="D"> ${q.option_d}</label>
                            </div>
                          </div>`;
            });
            document.getElementById("questionsArea").innerHTML = html;
            // store answers on change
            document.querySelectorAll("input[type=radio]").forEach(radio => {
                radio.addEventListener("change", (e) => {
                    let name = e.target.name;
                    answers[name] = e.target.value;
                });
            });
        });

    function submitExam() {
        clearInterval(timerInterval);
        let answerData = [];
        for(let key in answers) {
            answerData.push({qid: key.replace("q",""), ans: answers[key]});
        }
        fetch("submit_exam.php", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({roll: roll, answers: answerData})
        }).then(res => res.text()).then(data => {
            alert("Exam submitted! Score: " + data);
            window.location.href = "index.html";
        });
    }

    window.onload = () => {
        let display = document.querySelector("#timer");
        startTimer(900, display); // 15 mins
    };
</script>
</body>
</html>
